name: Planta Baixa da Fábrica

on:
  push:
    branches:
      - main

jobs:
  construir-planta:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Mostrar início da simulação
        run: echo "Iniciando a criação da planta baixa da fábrica..."

      - name: Criar setores da fábrica
        run: |
          echo "Setor 1: Entrada de materiais"
          echo "Setor 2: Linha de produção"
          echo "Setor 3: Controle de qualidade"
          echo "Setor 4: Estoque"
          echo "Setor 5: Expedição"

      - name: Finalizar simulação
        run: echo "Planta baixa da fábrica criada com sucesso!"
